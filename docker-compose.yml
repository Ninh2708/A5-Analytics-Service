services:

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Analytics Service
      - DEBUG=False
      - DATABASE_URL=postgresql://analytics_user:analytics_pass@postgres:5432/analytics_db
      - IOT_SERVICE_URL=http://26.160.13.137:8001
      - CAMERA_SERVICE_URL=http://26.244.129.17:8002
      - ACCESS_GATE_URL=http://26.206.154.32:8003
      - CORE_BUSINESS_URL=http://26.64.81.15:8004
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - analytics-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:15-alpine
    container_name: analytics-postgres
    environment:
      - POSTGRES_USER=analytics_user
      - POSTGRES_PASSWORD=analytics_pass
      - POSTGRES_DB=analytics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - analytics-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - analytics-network

volumes:
  postgres_data:

networks:
  analytics-network:
    driver: bridge
